<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0c">
  <title>BFMiDi · Manual do Usuário</title>
  <link rel="icon" href="img/app.svg" type="image/svg+xml">
  <!-- CSS REAL do webApp (componentes bf-*) — os mockups usam as mesmas
       classes do app, então ficam pixel-idênticos. manual.css vem depois
       e só rege a casca do manual (topbar/sidebar/legendas). -->
  <link rel="stylesheet" href="css/app.css?v=20260611resp2">
  <link rel="stylesheet" href="css/manual.css?v=20260611resp2">
</head>
<body>
  <!-- ───────────────────────── Topbar fixa ───────────────────────── -->
  <header class="mn-topbar">
    <button class="mn-burger" id="mnBurger" aria-label="Abrir índice" title="Índice">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/>
      </svg>
    </button>
    <a class="mn-brand" href="#" aria-label="Início do manual">
      <img src="img/app-192.png" alt="" width="28" height="28">
      <span class="mn-brand-name">BFMiDi <span class="accent">·</span> Manual</span>
    </a>

    <!-- ───── Ferramentas: tema claro/escuro + idioma ───── -->
    <div class="mn-tools" id="mnTools">
      <div class="mn-theme-seg" role="group" aria-label="Tema">
        <button class="mn-theme-btn" id="mnThemeLight" type="button" data-theme="light"
                title="Modo claro" aria-label="Modo claro">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4.2"/>
            <path d="M12 2v2.4M12 19.6V22M4.5 4.5l1.7 1.7M17.8 17.8l1.7 1.7M2 12h2.4M19.6 12H22M4.5 19.5l1.7-1.7M17.8 6.2l1.7-1.7"/>
          </svg>
        </button>
        <button class="mn-theme-btn" id="mnThemeDark" type="button" data-theme="dark"
                title="Modo escuro" aria-label="Modo escuro">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.6 6.6 0 0 0 9.8 9.8z"/>
          </svg>
        </button>
      </div>
      <button class="mn-lang-btn" id="mnLang" type="button" title="Idioma" aria-label="Trocar idioma">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <path d="M3 12h18M12 3c2.6 2.6 3.8 5.6 3.8 9s-1.2 6.4-3.8 9c-2.6-2.6-3.8-5.6-3.8-9s1.2-6.4 3.8-9z"/>
        </svg>
        <span class="mn-lang-code" id="mnLangCode">PT</span>
      </button>
    </div>

    <div class="mn-search-wrap" id="mnSearchWrap">
      <svg class="mn-search-ico" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.5" y2="16.5"/>
      </svg>
      <input type="search" id="mnSearch" class="mn-search" placeholder="Buscar no manual…"
             autocomplete="off" spellcheck="false" aria-label="Buscar no manual">
      <div class="mn-search-pop" id="mnSearchPop" hidden></div>
    </div>
  </header>

  <div class="mn-shell">
    <!-- ─────────────────────── Sidebar / índice ─────────────────────── -->
    <nav class="mn-sidebar" id="mnSidebar" aria-label="Índice do manual">
      <div class="mn-sidebar-inner" id="mnSidebarInner"><!-- gerado por JS --></div>
    </nav>
    <div class="mn-sidebar-backdrop" id="mnSidebarBackdrop" hidden></div>

    <!-- ───────────────────────── Conteúdo ───────────────────────── -->
    <main class="mn-main" id="mnMain"><!-- gerado por JS --></main>
  </div>

  <!-- ─────────────── Modal de informação dos campos (i) ─────────────── -->
  <div class="mn-modal-backdrop" id="mnModalBackdrop" hidden>
    <div class="mn-modal" role="dialog" aria-modal="true" aria-labelledby="mnModalTitle">
      <div class="mn-modal-head">
        <span class="mn-modal-crumb" id="mnModalCrumb"></span>
        <button class="mn-modal-close" id="mnModalClose" aria-label="Fechar">✕</button>
      </div>
      <h3 class="mn-modal-title" id="mnModalTitle"></h3>
      <div class="mn-modal-body" id="mnModalBody"></div>
    </div>
  </div>

  <script src="js/content.js?v=20260611resp2"></script>
  <script src="js/manual.js?v=20260611resp2"></script>
</body>
</html>
